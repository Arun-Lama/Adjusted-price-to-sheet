name: Daily Price Adjustment

on:
  schedule:
    - cron: '45 9 * * 0-4' 
  workflow_dispatch:

jobs:
  run-price-adjustment:
    runs-on: ubuntu-latest

    env:
      GCP_SA_KEY_BASE64: ${{ secrets.GCP_SA_KEY_BASE64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install ChromeDriver 142 (matching GitHub Actions Chrome)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          
          # Download ChromeDriver 142.0.7241.0
          wget -q https://storage.googleapis.com/chrome-for-testing-public/142.0.7241.0/linux64/chromedriver-linux64.zip
          unzip chromedriver-linux64.zip
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/
          sudo chmod +x /usr/local/bin/chromedriver
          
          # Verify installation
          chromedriver --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Decode GCP service account key
        run: |
          echo "$GCP_SA_KEY_BASE64" | base64 --decode > gcp-credentials.json

      - name: Run price adjustment script
        run: python price_adjustment.py