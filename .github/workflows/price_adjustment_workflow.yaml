name: Daily Price Adjustment

on:
  schedule:
    - cron: '45 9 * * 0-4' 
  workflow_dispatch:

jobs:
  run-price-adjustment:
    runs-on: ubuntu-latest

    env:
      GCP_SA_KEY_BASE64: ${{ secrets.GCP_SA_KEY_BASE64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Set up Chrome and ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Decode GCP service account key
        run: |
          echo "$GCP_SA_KEY_BASE64" | base64 --decode > gcp-credentials.json

      - name: Run price adjustment script
        run: python price_adjustment.py

      - name: Commit and push adjusted price CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add "adjusted price/*.csv"
          git commit -m "Daily adjusted price update" || echo "No changes to commit"
          git push
